[project]
name = "otto"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "claude-agent-sdk>=0.1.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.0",
    "fastapi>=0.100",
    "httpx>=0.24",
]

[project.scripts]
otto = "otto.cli:main"

[tool.setuptools.packages.find]
include = ["otto*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"
