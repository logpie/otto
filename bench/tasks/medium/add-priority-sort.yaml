tags: [feature, sorting]
spec: |
  Add sorting capabilities to TaskStore:
  1. list_by_priority() — returns tasks sorted by priority (high first, then
     medium, then low). Within the same priority, sort by creation date (oldest
     first).
  2. list_by_status(status: str) — returns only tasks with the given status.
  3. list_sorted(sort_by: str) — generic sort accepting "priority", "status",
     "title", or "created_at". Raise ValueError for unknown sort keys.
