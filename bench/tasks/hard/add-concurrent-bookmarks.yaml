name: add-concurrent-bookmarks
repo: bookmarks
commit: 3187ed78ad89bd4c74c77acb6c23e784a72c77c6
difficulty: hard
timeout: 600
tags: [concurrency, reliability]
spec: |
  Make the bookmark store thread-safe:
  1. Add file locking (fcntl.flock) to all read/write operations so multiple
     processes can safely use the same bookmarks file.
  2. Use atomic writes (write to temp file, then os.replace) to prevent
     corruption on crash.
  3. Add a bulk_add(bookmarks_list, filepath) function that adds multiple
     bookmarks in a single locked transaction.
  Ensure the existing API (add_bookmark, delete_bookmark, etc.) still works
  unchanged but is now safe for concurrent access.
validator: validators/add-concurrent-bookmarks/
