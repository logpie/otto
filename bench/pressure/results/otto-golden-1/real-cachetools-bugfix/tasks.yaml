  prompt: 'Fix the cache stampede bug in cachetools function decorators (ttl_cache,
    lru_cache, etc.). The bug: when many threads simultaneously call a decorated function
    before the first call returns, ALL threads get cache misses instead of only one.
    With 1000 threads calling a function that sleeps 0.1s, the expected result is
    CacheInfo(hits=999, misses=1) but the actual is CacheInfo(hits=0, misses=1000).
    The lock is released before the value is stored in the cache, allowing all threads
    to execute the underlying function. Fix the lock/cache interaction so only one
    thread executes the function while others wait for the cached result. Add a threading
    test that verifies: spawn 100 threads calling the same cached function simultaneously,
    assert misses=1 and hits=99. Run tests with: pytest'
  status: passed
  spec:
  - text: 'When 100 threads simultaneously call the same cached function (decorated
      with lru_cache, ttl_cache, or any cachetools function decorator that uses a
      lock), only 1 thread executes the underlying function and the other 99 wait
      for and receive the cached result: cache_info() returns misses=1 and hits=99.'
    verifiable: true
    test_hint: decorate a function that increments an atomic counter and sleeps briefly,
      spawn 100 threads calling it with the same args concurrently via a threading.Barrier,
      join all, assert cache_info().misses == 1 and cache_info().hits == 99 and counter
      == 1.
  - text: 'The fix applies to both locked decorator variants: _cached_locked_info
      (used by func.py decorators like lru_cache/ttl_cache with info=True) and _cached_locked
      (used by cached() with lock and without info). Both must prevent stampede.'
    verifiable: true
    test_hint: test cached(cache=LRUCache(128), lock=RLock()) without info=True separately;
      spawn 100 concurrent threads, verify the underlying function is called exactly
      once.
  - text: The underlying function is called exactly once per unique cache key under
      concurrent access. With 100 threads all calling with the same arguments, the
      function body executes exactly 1 time.
    verifiable: true
    test_hint: use a threading-safe counter (e.g., itertools.count or threading lock-protected
