  feedback: 'CRITICAL SETUP: Before running any tests, you MUST install the package
    in dev mode: `uv pip install -e /private/tmp/bench-real-cachetools-bugfix`. Without
    this, all tests fail with collection errors because cachetools is not importable.


    THE BUG: In src/cachetools/_decorators.py, both `_cached_locked_info` and `_cached_locked`
    have a cache stampede bug. The lock is released after the KeyError (cache miss)
    before func() is called. This creates a window where all concurrent threads see
    misses.


    FIX: In `_cached_locked_info`, restructure the wrapper to hold the lock for the
    entire check-compute-store cycle. Replace the two separate `with lock:` blocks
    with a single block that: (1) checks the cache, (2) on miss calls func(), (3)
    stores in cache. Same fix for `_cached_locked`. The func() call must happen INSIDE
    the lock.


    TEST: Add a threading test in tests/test_func.py that spawns 100 threads calling
    the same cached function simultaneously (use a threading.Barrier to synchronize
    start), then asserts cache_info().misses == 1 and cache_info().hits == 99.'
