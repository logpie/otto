tasks:
- id: 1
  key: 829619d2f2bd
  prompt: 'The python-dotenv CLI crashes if the current working directory has been
    deleted before importing dotenv. When a user runs a dotenv CLI command from a
    directory that no longer exists, os.getcwd() raises FileNotFoundError at module
    import time because the default --file option evaluates os.path.join(os.getcwd(),
    ''.env'') eagerly. Fix the CLI so that it gracefully handles a missing current
    working directory instead of crashing. The fix should be in src/dotenv/cli.py.
    Run tests with: pytest'
  status: passed
  spec:
  - text: Importing `dotenv.cli` does not raise `FileNotFoundError` (or any other
      exception) when the current working directory has been deleted before import.
    verifiable: true
    test_hint: "in a subprocess, create a temp dir, chdir into it, delete the dir\
      \ from outside, then `python -c \"from dotenv.cli import cli\"` \u2014 assert\
      \ exit code 0 and no traceback in stderr."
  - text: Running a dotenv CLI command (e.g., `dotenv list`) from a deleted working
      directory does not crash with an unhandled exception. The process exits without
      a Python traceback.
    verifiable: true
    test_hint: "in a subprocess, create a temp dir, chdir into it, delete the dir,\
      \ then run `python -m dotenv list` \u2014 assert no traceback in stderr and\
      \ exit code is not 1 due to FileNotFoundError."
  - text: The fix is in `src/dotenv/cli.py`. No other source files under `src/dotenv/`
      are modified.
    verifiable: true
    test_hint: '`git diff --name-only` shows only `src/dotenv/cli.py` (test files
      may also be added/modified, but no other src/dotenv/ files).'
  - text: When the current working directory exists, the `--file` option still defaults
      to `.env` in the current working directory (i.e., the path equivalent of `os.path.join(os.getcwd(),
      '.env')`). No regression in default file resolution.
    verifiable: true
    test_hint: "from a valid directory containing a `.env` file, run `dotenv list`\
      \ without `--file` \u2014 verify it reads from `<cwd>/.env`."
  - text: All existing tests pass when run with `pytest`.
    verifiable: true
    test_hint: run `pytest` from the project root and assert all tests pass (exit
      code 0).
  - text: The eager evaluation of `os.path.join(os.getcwd(), '.env')` in the `default=`
      parameter of the `--file` Click option is removed or deferred so that it is
      not evaluated at module import time.
    verifiable: true
    test_hint: read `src/dotenv/cli.py` and confirm the `@click.option('-f', '--file',
      default=...)` no longer calls `os.getcwd()` at decoration/import time.
  - text: "When CWD is deleted and no `--file` is provided, the CLI does not silently\
      \ use a wrong or empty path \u2014 it either falls back to a sensible default\
      \ (e.g., `.env` relative) or produces a clear error message. It does not crash\
      \ with an unhandled exception."
    verifiable: true
    test_hint: "from a deleted CWD, run `dotenv get FOO` without `--file` \u2014 assert\
      \ no Python traceback; the process may report an error but must not crash."
  feedback: 'IMPORTANT SETUP: The `sh` module has been installed and tests now run.
    There are 9 pre-existing test failures unrelated to this task (case sensitivity
    in log messages, missing .env files in test cwd). Focus on the actual bug:


    The bug is on line 21 of src/dotenv/cli.py: `default=os.path.join(os.getcwd(),
    ''.env'')` eagerly calls os.getcwd() at import time. If CWD is deleted, this raises
    FileNotFoundError.


    Fix approach: Replace the eager os.getcwd() call with a lazy approach. Best option:
    set default=None for the --file option, then inside the cli() function body, resolve
    it: if file is None, try os.path.join(os.getcwd(), ''.env'') wrapped in a try/except
    (FileNotFoundError, OSError) that falls back to ''.env''. This way the module
    can be imported even when CWD is deleted, and the error is handled gracefully
    at runtime.


    For verification: the test should create a temp directory, chdir into it, delete
    it, then invoke the CLI and verify it doesn''t crash with FileNotFoundError. The
    baseline has 9 pre-existing failures - only count NEW failures as regressions.'
