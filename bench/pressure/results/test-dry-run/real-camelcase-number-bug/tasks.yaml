  - text: "Existing digit-to-letter transitions within unseparated strings still uppercase\
      \ correctly: `hello1world` \u2192 `hello1World`, `h2w` \u2192 `h2W`, `1hello`\
      \ \u2192 `1Hello`"
    verifiable: true
    test_hint: assert camelCase('hello1world') === 'hello1World', camelCase('h2w')
      === 'h2W', camelCase('1hello') === '1Hello'
  - text: 'Digit-containing tokens that span a separator do not mis-case the letter
      immediately following the digit: the character after the digit within the same
      original token stays lowercase'
    verifiable: true
    test_hint: assert 'b2b' portion stays lowercase in the output; the 'b' after '2'
      is NOT uppercased
  - text: '`npm test` exits with code 0'
    verifiable: true
    test_hint: run `npm test`, assert exit code is 0
  feedback: "The bug is in the `postProcess` function (line 48-54 of index.js). The\
    \ `NUMBERS_AND_IDENTIFIER` regex (`\\d+` + identifier) on line 53 matches digit\
    \ sequences followed by a letter and uppercases the whole match. This is wrong\
    \ for cases like `b2b_registration_request` because `2b` gets matched and uppercased\
    \ to `2B`. The fix: the NUMBERS_AND_IDENTIFIER replacement should NOT uppercase\
    \ the trailing identifier character \u2014 it should only consume the digits without\
    \ changing the case of the following letter. The separator-based uppercasing (SEPARATORS_AND_IDENTIFIER\
    \ on line 52) already handles the actual word boundaries correctly. Consider changing\
    \ the replacement function on line 53 to only uppercase digits (which is a no-op)\
    \ rather than the trailing identifier char, or adjust the regex to not capture\
    \ the trailing letter."
