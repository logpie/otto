tasks:
- id: 1
  key: 1bab2b197584
  prompt: 'The string-width library incorrectly calculates the width of minimally-qualified
    and unqualified emoji sequences. For example, keycap sequences like "1\u20E3"
    (digit one + combining enclosing keycap, without VS16) render as double-width
    emoji in terminals but string-width reports them as width 1. Similarly, ZWJ emoji
    sequences that lack VS16 qualifiers (like "\u{1F468}\u200D\u{1F469}\u200D\u{1F467}"
    without the \uFE0F characters) are not detected by the \p{RGI_Emoji} regex because
    they''re "minimally qualified", so they fall through to East Asian Width logic
    which returns incorrect widths. Fix index.js to detect these non-RGI but still
    double-width emoji sequences: keycap sequences (digit/hash/asterisk + U+20E3)
    and ZWJ sequences with 2+ Extended_Pictographic code points. Run tests with: npm
    test'
  status: passed
  spec:
  - text: 'Keycap sequences without VS16 (base + U+20E3, where base is a digit 0-9,
      ''#'', or ''*'') return width 2. Example: "1\u20E3" must return 2, not 1.'
    verifiable: true
    test_hint: assert stringWidth("1\u20E3") === 2; repeat for "0\u20E3", "#\u20E3",
      "*\u20E3", "9\u20E3"
  - text: 'ZWJ sequences containing 2 or more Extended_Pictographic code points joined
      by ZWJ (U+200D) return width 2, even without VS16 (\uFE0F) qualifiers. Example:
      "\u{1F468}\u200D\u{1F469}\u200D\u{1F467}" must return 2.'
    verifiable: true
    test_hint: assert stringWidth("\u{1F468}\u200D\u{1F469}\u200D\u{1F467}") === 2;
      also test "\u{1F468}\u200D\u{1F469}" (two EP joined by ZWJ)
  - text: 'Plain keycap-base characters without U+20E3 remain width 1: digits 0-9,
      ''#'', and ''*'' are unaffected by the fix.'
    verifiable: true
    test_hint: assert stringWidth("1") === 1, stringWidth("#") === 1, stringWidth("*")
      === 1, stringWidth("0") === 1
  - text: Fully-qualified RGI emoji sequences (keycap sequences with VS16 like "1\uFE0F\u20E3",
      ZWJ families like "\u{1F468}\u200D\u{1F469}\u200D\u{1F467}\u200D\u{1F466}")
      still return width 2.
    verifiable: true
    test_hint: assert stringWidth("1\uFE0F\u20E3") === 2; assert stringWidth("\u{1F468}\u200D\u{1F469}\u200D\u{1F467}\u200D\u{1F466}")
      === 2 (the RGI path must not regress)
  - text: All pre-existing tests pass. Running `npm test` exits with code 0 and no
      test failures.
    verifiable: true
    test_hint: run `npm test`, assert exit code 0
  - text: Only index.js is modified; no changes to test infrastructure, dependencies,
      or configuration files are required for the fix itself (new tests may be added
      to test.js).
    verifiable: true
    test_hint: '`git diff --name-only` shows index.js; test.js changes are additive
      only'
  - text: A ZWJ sequence with only one Extended_Pictographic code point (e.g., a single
      emoji followed by ZWJ and a non-pictographic character) is not falsely promoted
      to width 2 by the new logic.
    verifiable: true
    test_hint: assert stringWidth("A\u200D\u{1F469}") does not return 2 from the new
      ZWJ detection path (Intl.Segmenter may cluster this differently -- verify the
      segment boundary behavior); stringWidth("\u{1F468}\u200D") should not be 2 for
      a lone emoji+ZWJ that segments as a single cluster
