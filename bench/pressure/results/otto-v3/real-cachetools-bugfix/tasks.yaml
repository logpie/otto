  feedback: "IMPORTANT: pyproject.toml now has [tool.pytest.ini_options] pythonpath\
    \ = [\"src\"], so `pytest` works directly.\n\nThe bug is in `src/cachetools/_decorators.py`\
    \ in two functions: `_cached_locked_info` (line 4) and `_cached_locked` (line\
    \ 86). Both release the lock after a cache miss, then call func() outside the\
    \ lock, causing the stampede.\n\nFIX: Move the func() call and cache store INSIDE\
    \ the `with lock:` block. On KeyError, do NOT exit the lock \u2014 keep holding\
    \ it, call func(), store result, then release. Example for `_cached_locked_info`:\n\
    \n```python\ndef wrapper(*args, **kwargs):\n    nonlocal hits, misses\n    k =\
    \ key(*args, **kwargs)\n    with lock:\n        try:\n            result = cache[k]\n\
    \            hits += 1\n            return result\n        except KeyError:\n\
    \            misses += 1\n        v = func(*args, **kwargs)\n        try:\n  \
    \          return cache.setdefault(k, v)\n        except ValueError:\n       \
    \     return v\n```\n\nApply the same pattern to `_cached_locked`. The lock is\
    \ an RLock so recursive calls are safe.\n\nFor the threading test in `tests/test_func.py`:\
    \ use threading.Barrier(100) + threading.Thread, decorate a function with @lru_cache\
    \ that does a small sleep, have all threads call it with the same args, assert\
    \ misses==1 and hits==99."
