  prompt: 'Fix the klona bug from issue #30 where cloning class instances that initialize
    fields with Object.assign can produce the wrong result. The clone should reflect
    the source instance''s current state, not a fresh constructor default state, and
    nested values should still be copied deeply. Add tests covering a custom class
    initialized with Object.assign. Run tests with: npm test'
  status: passed
  spec:
  - text: 'Cloning a class instance that initializes fields via Object.assign in its
      constructor produces a clone whose own properties match the source instance''s
      current state, not a fresh constructor default state. For example, given `class
      Foo { constructor(data) { Object.assign(this, data); } }` and `new Foo({ name:
      ''hello'', count: 5 })`, the clone has `name === ''hello''` and `count === 5`.'
    verifiable: true
    test_hint: create class with Object.assign constructor, instantiate with data,
      clone with klona, assert each own property on clone equals the source value
  - text: "Nested object and array values within a cloned Object.assign-initialized\
      \ class instance are deeply copied \u2014 mutating nested values on the clone\
      \ does not affect the original, and vice versa."
    verifiable: true
    test_hint: 'create instance with nested object (e.g., `{ inner: { x: 1 } }`),
      clone it, mutate `clone.inner.x = 99`, assert `original.inner.x` is still 1'
  - text: The fix applies to all klona modes that support class cloning (at minimum
      the default `src/index.js` and lite `src/lite.js` modes). Each affected mode
      correctly clones Object.assign-initialized class instances.
    verifiable: true
    test_hint: import klona from each mode, run the Object.assign class clone scenario,
      assert correct results for each
  - text: Tests exist in the test suite covering a custom class that initializes fields
      with Object.assign in its constructor, exercising both property value correctness
      and deep-copy independence of nested values.
    verifiable: true
    test_hint: grep test files for Object.assign class test cases, confirm assertions
      on property values and reference independence
  - text: '`npm test` passes with zero failures (exit code 0), including all pre-existing
      tests and the new Object.assign class tests.'
    verifiable: true
    test_hint: run `npm test`, assert exit code 0 and no failing test output
  - text: The clone preserves the constructor identity of the source instance (i.e.,
      `clone.constructor === Original` and `clone instanceof Original` where applicable).
    verifiable: true
    test_hint: assert constructor and instanceof checks on the Object.assign class
      clone
  feedback: "INFRASTRUCTURE NOTE: The test runner has been fixed (esm \u2192 esbuild-register).\
    \ `npm test` passes 134/134 on the current baseline. Do NOT change the test script\
    \ in package.json.\n\nBUG ANALYSIS: The bug is in src/index.js lines 7-13 (class\
    \ instance cloning branch):\n```js\ntmp = new x.constructor();\nfor (k in x) {\n\
    \    if (tmp.hasOwnProperty(k) && tmp[k] !== x[k]) {\n        tmp[k] = klona(x[k]);\n\
    \    }\n}\n```\nThe condition `tmp.hasOwnProperty(k)` only copies properties that\
    \ already exist on the freshly constructed instance. If a class uses Object.assign(this,\
    \ defaults) in its constructor and the source instance has been modified (added/changed\
    \ properties), properties that don't exist on a fresh `new x.constructor()` are\
    \ silently dropped.\n\nFIX: Change `tmp.hasOwnProperty(k)` to `x.hasOwnProperty(k)`\
    \ so we iterate SOURCE properties instead of checking what the constructor produced.\
    \ Keep the `tmp[k] !== x[k]` optimization to avoid unnecessary deep copies.\n\n\
    Also check src/lite.js \u2014 it has the EXACT same pattern on its line with `tmp.hasOwnProperty(k)`.\n\
    \nNote: src/full.js does NOT need fixing \u2014 it uses Object.create + property\
    \ descriptors.\n\nTESTS: Add test cases in test/suites/class.js for a class using\
    \ Object.assign(this, defaults) in its constructor. Test that: (1) cloned values\
    \ match source state not defaults, (2) added properties survive cloning, (3) nested\
    \ objects are deeply cloned not reference-shared."
