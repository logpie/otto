  prompt: 'Fix the camelcase bug from issue #77 where inputs containing digits followed
    by separators are camel-cased incorrectly. For example, `b2b_registration_request`
    should become `b2bRegistrationRequest`, not mis-case the word after the numeric
    segment. Update the implementation and add tests covering underscore and dash
    variants while keeping normal camel-casing behavior intact. Run tests with: npm
    test'
  status: passed
  spec:
  - text: "Acceptance Criteria \u2014 Fix camelCase digit-separator bug (issue #77)"
    verifiable: true
  - text: "`camelCase('b2b_registration_request')` returns `'b2bRegistrationRequest'`\
      \ \u2014 digits within a separator-delimited word segment do not cause spurious\
      \ uppercasing of the following letter in the same segment"
    verifiable: true
    test_hint: assert camelCase('b2b_registration_request') === 'b2bRegistrationRequest'
  - text: 'The dash variant produces the same result: `camelCase(''b2b-registration-request'')`
      returns `''b2bRegistrationRequest''`'
    verifiable: true
    test_hint: assert camelCase('b2b-registration-request') === 'b2bRegistrationRequest'
  - text: Tests for both the underscore variant (`b2b_registration_request`) and the
      dash variant (`b2b-registration-request`) are present in test.js and pass
    verifiable: true
    test_hint: grep test.js for both input strings; run `npm test` and verify zero
      failures
  - text: 'Normal digit-as-word-boundary behavior is preserved for inputs without
      separators: `camelCase(''hello1world'')` returns `''hello1World''`, `camelCase(''h2w'')`
      returns `''h2W''`'
    verifiable: true
    test_hint: these assertions already exist in test.js lines 63 and 69; run `npm
      test` and verify they still pass
  - text: "All pre-existing tests continue to pass \u2014 the fix does not regress\
      \ any existing camelCase, pascalCase, preserveConsecutiveUppercase, locale,\
      \ or error-handling behavior"
    verifiable: true
    test_hint: run `npm test`; assert exit code 0 with zero failing tests
  - text: "The fix is in the implementation (index.js), not just in the tests \u2014\
      \ the `postProcess` function or its regex/replacement logic is modified so that\
      \ digit-letter sequences that were part of the same separator-delimited word\
      \ segment are not uppercased"
    verifiable: true
    test_hint: diff index.js against the original; confirm the NUMBERS_AND_IDENTIFIER
      handling has changed
  - text: '`npm test` is the test entry point and completes successfully'
    verifiable: true
    test_hint: run `npm test`; assert exit code 0
  feedback: "The bug is in the `postProcess` function (line 48-54 of index.js). The\
    \ `NUMBERS_AND_IDENTIFIER` regex (`\\d+` followed by identifier char) matches\
    \ digit+letter combos and uppercases them unconditionally. For input like `b2b_registration_request`,\
    \ after separator processing splits on `_`, the `2b` in `b2b` gets matched and\
    \ the `b` is uppercased incorrectly.\n\nThe fix should modify how `NUMBERS_AND_IDENTIFIER`\
    \ replacement works so that digits followed by letters within the SAME word segment\
    \ (i.e., not preceded by a separator) are NOT uppercased. Only digits that were\
    \ originally followed by a separator (or at a genuine word boundary) should trigger\
    \ uppercasing.\n\nOne approach: change the regex or the replacement function so\
    \ that only digit sequences that were originally at a separator boundary cause\
    \ uppercasing. For example, use a negative lookbehind for alpha chars, or change\
    \ the replacement to only uppercase if the match position was preceded by a separator\
    \ (already consumed by SEPARATORS_AND_IDENTIFIER).\n\nKey constraint: existing\
    \ tests like `hello1world` \u2192 `hello1World` and `h2w` \u2192 `h2W` must still\
    \ pass \u2014 these are cases where digits ARE genuine word boundaries (no separators\
    \ involved, the digit is between two letters in the original input). The difference\
    \ is `b2b_registration_request` has separators defining word boundaries, while\
    \ `hello1world` has digits as implicit boundaries.\n\nAdd tests for both `b2b_registration_request`\
    \ and `b2b-registration-request` variants."
