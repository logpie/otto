  prompt: 'Improve parseQuery as discussed in issue #282 so the returned query object
    is safer to use with arbitrary keys while preserving the existing parsing semantics.
    Add tests that verify normal query parsing still works and that the returned object
    shape is compatible with keys that would otherwise collide with object-prototype
    properties. Run tests with: npm test'
  status: passed
  spec:
  - text: parseQuery returns an object with a null prototype (no inherited properties
      from Object.prototype)
    verifiable: true
    test_hint: call parseQuery("a=1"), check Object.getPrototypeOf(result) === null
  - text: Keys that collide with Object.prototype properties (e.g., toString, hasOwnProperty,
      valueOf, constructor) can be parsed from query strings and stored/retrieved
      as regular data properties on the returned object
    verifiable: true
    test_hint: parseQuery("toString=x&hasOwnProperty=y&constructor=z"), assert result.toString
      === "x", result.hasOwnProperty === "y", result.constructor === "z"
  - text: The key "__proto__" can be parsed and stored as a plain data property on
      the returned object without affecting any prototype chain
    verifiable: true
    test_hint: parseQuery("__proto__=evil"), assert result["__proto__"] === "evil"
      and Object.getPrototypeOf(result) === null
  - text: "All consumers of parseQuery (getQuery, withQuery, normalizeURL, joinRelativeURL)\
      \ continue to work correctly with the null-prototype object \u2014 spread, property\
      \ access, and stringification remain functional"
    verifiable: true
    test_hint: 'call withQuery("/foo?page=1", { token: "x" }) and getQuery("http://foo.com/?a=1"),
      verify correct results'
  - text: New tests exist that verify normal query parsing behavior (key=value pairs,
      multiple values, encoded characters, empty values) and that the returned object
      is safe to use with prototype-colliding keys
    verifiable: true
    test_hint: run "npm test", all tests pass including new ones covering both normal
      parsing and prototype-collision safety
  - text: '"npm test" passes with zero failures'
    verifiable: true
    test_hint: run "npm test", assert exit code 0 and no test failures in output
  feedback: "The core change is in src/query.ts in the parseQuery function: replace\
    \ the plain object literal `{}` with `Object.create(null)` so the returned query\
    \ object has no prototype chain. This prevents keys like `toString`, `hasOwnProperty`,\
    \ `constructor`, `__proto__` from colliding with Object.prototype properties.\
    \ Also check withQuery in src/query.ts \u2014 it may use `obj[key]` patterns that\
    \ assume prototype methods exist; if so, use Object.hasOwn() or similar. For tests\
    \ in test/query.test.ts, add cases that: (1) verify parseQuery(\"toString=foo\"\
    ) returns an object where toString is the string \"foo\" not a function, (2) verify\
    \ hasOwnProperty key works, (3) verify the returned object has no prototype (Object.getPrototypeOf(result)\
    \ === null). Make sure existing tests still pass \u2014 the ParsedQuery type may\
    \ need updating if it's typed as a regular Record."
