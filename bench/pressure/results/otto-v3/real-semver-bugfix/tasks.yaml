tasks:
- id: 1
  key: 151f079489e2
  prompt: "Fix the prerelease identifier parsing bug in node-semver. The bug: prerelease\
    \ identifiers that start with digits but contain letters are truncated. For example,\
    \ '1.0.0-alpha.1ab' is coerced to '1.0.0-alpha.1', and '1.0.0-alpha.12ab' becomes\
    \ '1.0.0-alpha.12'. The issue is in the regex for PRERELEASEIDENTIFIER where NUMERICIDENTIFIER\
    \ is matched before NONNUMERICIDENTIFIER \u2014 since numeric matches greedily\
    \ on leading digits, a mixed identifier like '1ab' matches as '1' instead of '1ab'.\
    \ Fix the regex ordering so non-numeric identifiers are tried first, and add tests\
    \ that verify: (1) '1.0.0-alpha.1ab' parses correctly with prerelease ['alpha',\
    \ '1ab'], (2) '1.0.0-beta.12ab34' preserves the full identifier, (3) pure numeric\
    \ identifiers like '1.0.0-alpha.1' still work, (4) coerce() handles these cases\
    \ too. Run tests with: npm test"
  status: passed
  spec:
  - text: Parsing '1.0.0-alpha.1ab' produces a SemVer object with prerelease array
      ['alpha', '1ab']
    verifiable: true
    test_hint: '`new SemVer(''1.0.0-alpha.1ab'').prerelease` deep-equals [''alpha'',
      ''1ab'']; version string equals ''1.0.0-alpha.1ab'''
  - text: "Parsing '1.0.0-beta.12ab34' preserves the full mixed identifier \u2014\
      \ prerelease array is ['beta', '12ab34']"
    verifiable: true
    test_hint: '`new SemVer(''1.0.0-beta.12ab34'').prerelease` deep-equals [''beta'',
      ''12ab34'']; version string equals ''1.0.0-beta.12ab34'''
  - text: 'Pure numeric prerelease identifiers are unaffected: ''1.0.0-alpha.1'' parses
      with prerelease [''alpha'', 1] (numeric type for ''1'')'
    verifiable: true
    test_hint: '`new SemVer(''1.0.0-alpha.1'').prerelease` deep-equals [''alpha'',
      1]; typeof prerelease[1] === ''number'''
  - text: 'coerce(''1.0.0-alpha.1ab'', { includePrerelease: true }) returns a SemVer
      with prerelease [''alpha'', ''1ab'']'
    verifiable: true
    test_hint: call coerce with includePrerelease, assert prerelease deep-equals ['alpha',
      '1ab']
  - text: 'coerce(''1.0.0-beta.12ab34'', { includePrerelease: true }) returns a SemVer
      with prerelease [''beta'', ''12ab34'']'
    verifiable: true
    test_hint: call coerce with includePrerelease, assert prerelease deep-equals ['beta',
      '12ab34']
  - text: 'The fix is in the PRERELEASEIDENTIFIER regex ordering: NONNUMERICIDENTIFIER
      is matched before NUMERICIDENTIFIER in the alternation (and likewise for PRERELEASEIDENTIFIERLOOSE)'
    verifiable: true
    test_hint: "inspect src[t.PRERELEASEIDENTIFIER] \u2014 the non-numeric alternative\
      \ must appear before the numeric alternative in the regex alternation"
  - text: "All existing tests pass \u2014 `npm test` exits with code 0"
    verifiable: true
    test_hint: run `npm test`, assert exit code 0 and no test failures
  - text: "New tests are added that cover cases (1)-(5) above \u2014 the test suite\
      \ includes assertions for mixed alphanumeric prerelease identifiers in both\
      \ parse and coerce paths"
    verifiable: true
    test_hint: grep test files for '1ab' and '12ab34'; verify test cases exist for
      both SemVer parsing and coerce()
  feedback: "The bug is in the regex definition order. Look at the PRERELEASEIDENTIFIER\
    \ regex pattern \u2014 it currently tries NUMERICIDENTIFIER before NONNUMERICIDENTIFIER.\
    \ Since NUMERICIDENTIFIER greedily matches leading digits (e.g., '1' from '1ab'),\
    \ mixed identifiers get truncated. The fix is to swap the alternation order so\
    \ NONNUMERICIDENTIFIER (which matches digits+letters) is tried FIRST. This is\
    \ likely in a file like internal/re.js or similar. Also check if coerce() has\
    \ the same issue. Add tests for the 4 cases listed in the prompt."
  attempts: 1
