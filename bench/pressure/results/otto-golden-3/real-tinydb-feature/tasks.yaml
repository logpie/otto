  feedback: "Key implementation details:\n\n1. In tinydb/table.py Table.__init__:\
    \ Add `persist_empty: bool = False` parameter. Store as `self._persist_empty`.\
    \ If True, call `self._update_table(lambda table: table)` to write an empty dict\
    \ for this table to storage immediately.\n\n2. In tinydb/database.py TinyDB.table():\
    \ The **kwargs already get passed through to Table constructor, so persist_empty\
    \ will flow through naturally.\n\n3. In Table.clear_cache() and Table.clear():\
