tasks:
- id: 1
  key: 5ade484339d7
  prompt: 'Add the filterQuery utility requested in issue #230. It should take a URL-like
    input and a predicate over query keys, then return the same URL with only the
    matching query parameters preserved while leaving the path and fragment untouched.
    Add tests covering basic filtering, repeated keys, and fragment preservation.
    Run tests with: npm test'
  status: passed
  spec:
  - text: '`filterQuery(input, predicate)` is exported from the package root (`import
      { filterQuery } from "ufo"`) and is a function that accepts a URL-like string
      and a predicate `(key: string) => boolean`, returning a string.'
    verifiable: true
    test_hint: import { filterQuery } from "../src"; assert typeof filterQuery ===
      "function"; call with ("/?a=1&b=2", k => k === "a") and verify return type is
      string
  - text: Only query parameters whose key satisfies the predicate are kept; all others
      are removed. For example, filterQuery("/path?a=1&b=2&c=3", k => k !== "b") returns
      a URL containing query params `a=1` and `c=3` but not `b`.
    verifiable: true
    test_hint: assert filterQuery("/path?a=1&b=2&c=3", k => k !== "b") equals "/path?a=1&c=3"
  - text: "Repeated (array) query keys are preserved when the predicate matches the\
      \ key \u2014 all values for that key are kept, not just the first. For example,\
      \ filterQuery(\"/?tag=x&tag=y&other=1\", k => k === \"tag\") returns a URL with\
      \ both `tag=x` and `tag=y` present and `other` removed."
    verifiable: true
    test_hint: assert result of filtering for key "tag" on "/?tag=x&tag=y&other=1"
      contains both tag values and excludes "other"
  - text: "The path portion of the input is returned unchanged \u2014 filterQuery\
      \ does not alter, normalize, or strip the pathname."
    verifiable: true
    test_hint: filterQuery("/foo/bar?a=1&b=2", k => k === "a") starts with "/foo/bar";
      filterQuery("https://example.com/p?x=1", k => false) preserves "https://example.com/p"
  - text: "The fragment (hash) portion of the input is preserved exactly \u2014 filterQuery\
      \ does not remove, alter, or re-encode the fragment."
    verifiable: true
    test_hint: filterQuery("/path?a=1&b=2#frag", k => k === "a") ends with "#frag";
      filterQuery("/path?x=1#section", k => false) ends with "#section"
  - text: When the predicate matches no keys, the query string is removed entirely
      (no trailing `?`), while path and fragment remain intact. When the predicate
      matches all keys, the query string is returned as-is.
    verifiable: true
    test_hint: filterQuery("/?a=1&b=2", () => false) equals "/"; filterQuery("/?a=1&b=2",
      () => true) equals "/?a=1&b=2"
  - text: 'Tests exist covering at least three categories: basic filtering, repeated
      keys, and fragment preservation. All tests pass when running `npm test`.'
    verifiable: true
    test_hint: run `npm test`, assert exit code 0; inspect test file for describe/test
      blocks covering each category
  - text: The function is defined in the source tree (not only in test files) and
      re-exported through `src/index.ts`, consistent with all other utilities in the
      package.
    verifiable: true
    test_hint: grep for "filterQuery" in src/index.ts or a file re-exported by it;
      confirm it appears in the export surface
  feedback: 'Look at src/query.ts for existing query utility patterns (e.g. withQuery,
    getQuery, parseQuery, stringifyQuery). Follow the same code style. The filterQuery
    function should: 1) Parse the URL to separate path, query, and fragment 2) Parse
    query params 3) Filter by predicate on keys 4) Rebuild URL. Use existing ufo utilities
    like parseURL, stringifyParsedInput, parseQuery, stringifyQuery from the codebase.
    Export filterQuery from src/index.ts alongside other query exports. Add tests
    in test/query.test.ts following existing test patterns. Make sure repeated keys
    (tag=x&tag=y) are preserved when predicate matches.'
