tasks:
- id: 1
  key: 9001739f5dfc
  prompt: 'The iniconfig library currently does not handle inline comments properly
    when parsing INI files. Values like "key = value # this is a comment" retain the
    "# this is a comment" part in the parsed value. Add an IniConfig.parse() classmethod
    that accepts a data string and a strip_inline_comments parameter. When strip_inline_comments=True,
    inline comments (starting with # or ;) should be stripped from values. Also add
    a strip_section_whitespace parameter that strips whitespace from section names
    and key names. The parse() method should be a classmethod on IniConfig that returns
    a new instance. Run tests with: pytest'
  status: passed
  spec:
  - text: IniConfig.parse() is a classmethod on IniConfig that accepts a `data` string
      and returns a new IniConfig instance. The returned object has the same interface
      as a normally-constructed IniConfig (sections, get, __getitem__, __iter__, __contains__,
      lineof).
    verifiable: true
    test_hint: call IniConfig.parse(data="[s]\nk=v"), assert isinstance(result, IniConfig),
      verify result.sections, result["s"]["k"], result.get("s","k"), "s" in result
      all work
  - text: 'When strip_inline_comments=True, inline comments starting with # or ; are
      stripped from values. "key = value # this is a comment" parses with value "value"
      (trailing whitespace before the comment marker is also stripped). "key = value
      ; also a comment" parses with value "value".'
    verifiable: true
    test_hint: 'parse data with "k = hello # comment" and "k2 = world ; comment",
      assert values are "hello" and "world" respectively'
  - text: "When strip_inline_comments is not set to True (default behavior), inline\
      \ comments are NOT stripped \u2014 the value retains the full text after the\
      \ separator. \"key = value # this is a comment\" parses with value \"value #\
      \ this is a comment\"."
    verifiable: true
    test_hint: 'parse data without strip_inline_comments=True, assert value for "key
      = value # comment" is "value # comment"'
  - text: When strip_section_whitespace=True, whitespace is stripped from section
      names. A section header like "[  my section  ]" results in section name "my
      section".
    verifiable: true
    test_hint: parse data="[  spaced  ]\nk=v" with strip_section_whitespace=True,
      assert "spaced" in result.sections
  - text: When strip_section_whitespace=True, whitespace is stripped from key names.
      A line like "  my key  = value" results in key name "my key" (inner whitespace
      preserved, leading/trailing stripped).
    verifiable: true
    test_hint: parse data with "  padded_key  = val" under a section, with strip_section_whitespace=True,
      verify key is "padded_key"
  - text: When strip_section_whitespace is not set to True (default behavior), section
      names and key names retain whatever whitespace the base parser produces.
    verifiable: true
    test_hint: compare parse results with and without strip_section_whitespace on
      input with extra whitespace in section brackets
  - text: Both strip_inline_comments and strip_section_whitespace can be used together
      in a single parse() call and their effects combine independently.
    verifiable: true
    test_hint: 'parse data="[  sect  ]\n  k  = val # comment" with both=True, assert
      section="sect", key="k", value="val"'
  - text: All existing tests continue to pass (pytest runs green) and the parse()
      classmethod does not break the existing IniConfig constructor or any other public
      API.
    verifiable: true
    test_hint: run `pytest` from project root, assert exit code 0 with no failures
  feedback: "Key implementation details from codebase exploration:\n\n1. **IniConfig\
    \ class** is in `src/iniconfig/__init__.py` (lines 89-196). The constructor takes\
    \ `path`, `data`, and `encoding`. It calls `_parse.parse_lines()` to tokenize,\
    \ then builds `self.sections` dict and `self._sources` for line tracking.\n\n\
    2. **Parsing logic** is in `src/iniconfig/_parse.py`. `parse_lines()` returns\
    \ `ParsedLine` namedtuples. `_parseline()` handles individual line parsing. Currently\
    \ values are only `strip()`'d \u2014 inline comments are NOT stripped.\n\n3. **`parse()`\
    \ classmethod approach**: Create a `@classmethod` on `IniConfig` that accepts\
    \ `data` (string), `strip_inline_comments` (bool, default False), and `strip_section_whitespace`\
    \ (bool, default False). It should return a new `IniConfig` instance.\n\n4. **For\
    \ strip_inline_comments**: After parsing values via existing logic, strip trailing\
    \ `#` or `;` comments from values. Be careful with quoted strings \u2014 but looking\
    \ at the existing parser, there's no quote handling, so a simple approach of stripping\
    \ from the first unquoted `#` or `;` should work. Strip the comment marker and\
    \ everything after it, then strip trailing whitespace from the remaining value.\n\
    \n5. **For strip_section_whitespace**: Strip whitespace from section names and\
    \ key names during or after parsing.\n\n6. **Implementation strategy**: The cleanest\
    \ approach is to have `parse()` call the existing constructor (or reuse `parse_lines`),\
    \ then post-process the sections dict. Alternatively, add optional parameters\
    \ that flow through to the parsing layer.\n\n7. **Tests** are in `testing/test_iniconfig.py`.\
    \ Run with `pytest`.\n\n8. **Important**: The existing `__init__` builds sections\
    \ and raises on duplicates. The `parse()` classmethod should leverage existing\
    \ parsing but add the two new processing steps."
