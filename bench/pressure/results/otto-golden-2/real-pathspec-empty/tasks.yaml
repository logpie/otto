tasks:
- id: 1
  key: bd6abd8aebb6
  prompt: "When using pathspec with an empty list of patterns, certain backends (like\
    \ the re2 and hyperscan backends) raise a ValueError saying \"patterns cannot\
    \ be empty\" instead of gracefully returning no matches. The default regex backend\
    \ handles this case fine, but the re2 and hyperscan backends explicitly reject\
    \ empty pattern lists. Fix the backends so that empty pattern lists are handled\
    \ gracefully \u2014 the backends should initialize without error and return no\
    \ matches when given empty patterns, rather than raising ValueError. The fix should\
    \ be in pathspec/_backends/re2/pathspec.py and pathspec/_backends/hyperscan/pathspec.py.\
    \ Run tests with: pytest"
  status: passed
  spec:
  - text: The re2 backend does not raise ValueError when initialized with an empty
      list of patterns. Constructing a Re2PsBackend (or PathSpec using the re2 backend)
      with zero patterns completes without error.
    verifiable: true
    test_hint: instantiate the re2 backend with patterns=[], assert no exception is
      raised
  - text: The hyperscan backend does not raise ValueError when initialized with an
      empty list of patterns. Constructing a HyperscanPsBackend (or PathSpec using
      the hyperscan backend) with zero patterns completes without error.
    verifiable: true
    test_hint: instantiate the hyperscan backend with patterns=[], assert no exception
      is raised
  - text: The re2 backend returns no matches when initialized with empty patterns.
      Calling match_file (or equivalent match operations) on a re2 backend with empty
      patterns returns no matches for any input path.
    verifiable: true
    test_hint: create re2 backend with empty patterns, call match on ["foo.txt", "bar/baz.py"],
      assert result is empty
  - text: The hyperscan backend returns no matches when initialized with empty patterns.
      Calling match_file (or equivalent match operations) on a hyperscan backend with
      empty patterns returns no matches for any input path.
    verifiable: true
    test_hint: create hyperscan backend with empty patterns, call match on ["foo.txt",
      "bar/baz.py"], assert result is empty
  - text: The fix is in pathspec/_backends/re2/pathspec.py and pathspec/_backends/hyperscan/pathspec.py.
      No other backend files are modified.
    verifiable: true
    test_hint: git diff --name-only; assert only those two files (plus any new test
      files) are changed
  - text: 'Behavior is consistent across all three backends (simple, re2, hyperscan)
      for empty patterns: all initialize without error and all return no matches.'
    verifiable: true
    test_hint: for each backend, construct with empty patterns, match against sample
      files, assert identical empty results and no exceptions
  - text: The existing test suite passes. Running `pytest` from the project root exits
      with code 0 and no test failures.
    verifiable: true
    test_hint: run `pytest` in /private/tmp/bench-real-pathspec-empty, assert exit
      code 0 and no FAILED lines in output
  - text: Patterns that are all null-operations (e.g., only comments or blank lines
      that filter down to an empty list) also do not raise ValueError in re2 and hyperscan
      backends.
    verifiable: true
    test_hint: create PathSpec from lines like ["", "# comment"] with re2/hyperscan
      backend, assert no exception and no matches returned
  feedback: 'The fix is in two files: pathspec/_backends/re2/pathspec.py and pathspec/_backends/hyperscan/pathspec.py.
    Both have `if not patterns: raise ValueError(...)` in their `__init__`. Instead
    of raising, handle the empty case by: (1) returning early from __init__ after
    setting up empty/default internal state so match_file returns (None, None). For
    re2: set self._patterns={}, self._regex_data=[], self._set=None, self._debug_regex=False,
    then return. For hyperscan: set self._patterns={}, self._expr_data=[], self._db=None,
    self._out=(None, -1), self._debug_exprs=False, then return. (2) In match_file,
    add an early return check: if self._set is None (re2) or self._db is None (hyperscan),
    return (None, None). Make sure the isinstance check on patterns[0] only runs when
    patterns is non-empty (use elif or nest it inside the non-empty branch).'
  attempts: 1
