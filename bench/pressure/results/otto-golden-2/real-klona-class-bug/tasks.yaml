  key: 0385f84a4642
  prompt: 'Fix the klona bug from issue #30 where cloning class instances that initialize
    fields with Object.assign can produce the wrong result. The clone should reflect
    the source instance''s current state, not a fresh constructor default state, and
    nested values should still be copied deeply. Add tests covering a custom class
    initialized with Object.assign. Run tests with: npm test'
  status: passed
  spec:
  - text: "When a class constructor uses Object.assign(this, props) to add properties\
      \ beyond its own defaults, klona produces a clone containing ALL of the source\
      \ instance's own properties \u2014 not just those present on a freshly-constructed\
      \ instance."
    verifiable: true
    test_hint: create a class whose constructor does `Object.assign(this, props)`,
      instantiate with extra props (e.g. `apiKey`, `customFlag`), clone it, assert
      every own property from the source exists on the clone with the correct value.
  - text: The clone reflects the source instance's current property values, not the
      constructor's default values. If a constructor sets `this.timeout = 5000` but
      the source instance has `timeout = 10000`, the clone has `timeout = 10000`.
    verifiable: true
    test_hint: create a class with a default property, override it via Object.assign
      in constructor, clone, assert clone's value matches the overridden value (not
      the default).
  - text: "Nested object values within properties added via Object.assign are deeply\
      \ copied \u2014 mutating a nested object on the clone does not affect the source,\
      \ and vice versa."
    verifiable: true
    test_hint: 'create instance with Object.assign adding `{ nested: { a: 1 } }`,
      clone it, mutate `clone.nested.a = 999`, assert `source.nested.a` is still `1`.'
  - text: The fix applies to both the default mode (`klona` / `src/index.js`) and
      the lite mode (`klona/lite` / `src/lite.js`), since both contain the same buggy
      hasOwnProperty guard.
    verifiable: true
    test_hint: import from both `klona` and `klona/lite`, run the Object.assign class
      test against each, assert both produce correct clones.
  - text: New tests are added covering a custom class initialized with Object.assign.
      These tests pass when run via `npm test`.
    verifiable: true
    test_hint: run `npm test`, assert exit code 0; inspect test files for Object.assign
      class test cases.
  - text: "All pre-existing tests continue to pass \u2014 the fix does not regress\
      \ any other cloning behavior (plain objects, arrays, dates, RegExp, Maps, Sets,\
      \ Buffers, typed arrays, class instances without Object.assign, prototype methods,\
      \ etc.)."
    verifiable: true
    test_hint: run `npm test`, assert exit code 0 and no test failures.
  - text: The cloned instance is an instance of the same class (i.e., `clone instanceof
      OriginalClass` is true) and the clone is not reference-equal to the source (`clone
      !== source`).
    verifiable: true
    test_hint: assert `clone instanceof Config`, assert `clone !== source`, assert
      `clone.constructor === source.constructor`.
  feedback: "The bug is in src/index.js and src/lite.js. Both have identical class-handling\
    \ logic around lines 7-13:\n\n```javascript\nif (x.constructor !== Object && typeof\
    \ x.constructor === 'function') {\n    tmp = new x.constructor();\n    for (k\
    \ in x) {\n        if (tmp.hasOwnProperty(k) && tmp[k] !== x[k]) {\n         \
    \   tmp[k] = klona(x[k]);\n        }\n    }\n}\n```\n\nThe `tmp.hasOwnProperty(k)`\
    \ check is WRONG. It checks whether the FRESH instance has the property, not the\
    \ source. If the constructor uses Object.assign(this, props), the fresh `tmp`\
    \ won't have those dynamic properties, so they get silently dropped.\n\nFIX: Change\
    \ `tmp.hasOwnProperty(k)` to `x.hasOwnProperty(k)` \u2014 check the SOURCE object\
    \ for own properties, not the fresh instance. This ensures all own properties\
    \ from x get deep-copied.\n\nFor tests, add to test/suites/class.js a test for\
    \ a class like:\n```javascript\nclass Opts {\n    constructor(opts) {\n      \
    \  Object.assign(this, opts);\n    }\n}\n```\nVerify: clone reflects current state\
    \ (not defaults), nested objects are deeply cloned, clone is instanceof the class."
